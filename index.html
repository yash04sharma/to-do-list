<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo List</title>
    <link rel="stylesheet" href="todo.css">
</head>

<body>
    <div class="main">

        <h1 style="text-align:center; color: rgb(47, 36, 145);">To-Do List</h1>

        <div style="display:flex; justify-content:center; align-items:center;">

            <!-- <h2 style="color: darkblue;">Add Task...</h2> -->

            <input class="task1" type="text" placeholder="Add task">

            <button type="button" class="btn">➕</button>
        </div><br>

        <div class="re">
            <div class="result"></div>
        </div>

    </div>

    <div class="footer">
        <h2 class="count">Tasks : 0</h2>
        <button class="reset"><h2>Reset</h2></button>
    </div>

    <script src="todo.js"></script>

</body>

</html>
